name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install lightweight test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest numpy pandas pillow PyYAML opencv-python-headless imagehash scikit-learn scipy scikit-image fastapi httpx python-multipart
      - name: Run tests
        run: |
          PYTHONPATH=src:. pytest
